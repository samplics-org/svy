# .gitlab-ci.yml (repo root)
#
# Monorepo CI for svy.
# Each package has its own CI file, triggered by changes or tags.
#
# Structure:
#   packages/svy-rs/.gitlab-ci.yml   — Rust engine wheels
#   packages/svy-io/.gitlab-ci.yml   — I/O engine wheels
#   .gitlab-ci/svy.yml               — Main Python package tests
#

stages:
  - trigger

# =============================================================================
# svy-rs: Rust engine
# =============================================================================

svy-rs:
  stage: trigger
  trigger:
    include: packages/svy-rs/.gitlab-ci.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG =~ /^svy-rs-v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/svy-rs/**
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# =============================================================================
# svy-io: I/O engine
# =============================================================================

svy-io:
  stage: trigger
  trigger:
    include: packages/svy-io/.gitlab-ci.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG =~ /^svy-io-v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - packages/svy-io/**
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual

# =============================================================================
# svy: Main Python package (tests, lint, publish)
# =============================================================================

svy:
  stage: trigger
  trigger:
    include: .gitlab-ci/svy.yml
    strategy: depend
  rules:
    - if: $CI_COMMIT_TAG =~ /^svy-v/
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - src/svy/**
        - tests/**
        - pyproject.toml
    - if: $CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - src/svy/**
        - tests/**
    - if: $CI_PIPELINE_SOURCE == "web"
      when: manual
