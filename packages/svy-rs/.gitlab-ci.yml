# packages/svy-rs/.gitlab-ci.yml
#
# Child pipeline: Build and publish svy-rs wheels.
# Triggered from root .gitlab-ci.yml
#

stages:
  - build
  - validate
  - publish

variables:
  SVY_RS_DIR: packages/svy-rs

# =============================================================================
# Build wheels
# =============================================================================

build-linux-x86_64:
  stage: build
  image: quay.io/pypa/manylinux_2_28_x86_64
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$HOME/.cargo/env"
    - /opt/python/cp311-cp311/bin/pip install maturin>=1.8
    - export PATH="/opt/python/cp311-cp311/bin:$PATH"
  script:
    - cd ${SVY_RS_DIR}
    - rm -rf dist && mkdir -p dist
    - maturin build --release --out dist --manylinux 2_28 -i python3.11
    - ls -lh dist/
    - pip3.11 install dist/*.whl
    - python3.11 -c "import svy_rs; print('OK:', svy_rs.__name__)"
  artifacts:
    paths:
      - ${SVY_RS_DIR}/dist/*.whl
    expire_in: 7 days

build-linux-aarch64:
  stage: build
  image: quay.io/pypa/manylinux_2_28_aarch64
  tags:
    - arm64
  variables:
    CARGO_PROFILE_RELEASE_OPT_LEVEL: "2"
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$HOME/.cargo/env"
    - pip3.11 install maturin>=1.8
  script:
    - cd ${SVY_RS_DIR}
    - rm -rf dist && mkdir -p dist
    - maturin build --release --out dist --manylinux 2_28 -i python3.11
    - ls -lh dist/
    - pip3.11 install dist/*.whl
    - python3.11 -c "import svy_rs; print('OK:', svy_rs.__name__)"
  artifacts:
    paths:
      - ${SVY_RS_DIR}/dist/*.whl
    expire_in: 7 days
  allow_failure: true

build-macos-arm64:
  stage: build
  tags:
    - macos-arm64
  before_script:
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - source "$HOME/.cargo/env"
    - pip3 install maturin>=1.8
  script:
    - cd ${SVY_RS_DIR}
    - rm -rf dist && mkdir -p dist
    - maturin build --release --out dist -i python3
    - ls -lh dist/
    - pip3 install dist/*.whl
    - python3 -c "import svy_rs; print('OK:', svy_rs.__name__)"
  artifacts:
    paths:
      - ${SVY_RS_DIR}/dist/*.whl
    expire_in: 7 days
  allow_failure: true

build-windows-amd64:
  stage: build
  tags:
    - windows
  script:
    - choco install -y rustup.install python311 --no-progress
    - refreshenv
    - rustup default stable
    - pip install maturin>=1.8
    - cd ${SVY_RS_DIR}
    - if (Test-Path dist) { Remove-Item -Recurse -Force dist }
    - New-Item -ItemType Directory -Path dist -Force
    - maturin build --release --out dist -i python
    - Get-ChildItem dist
    - pip install (Get-ChildItem dist\*win_amd64.whl | Select-Object -First 1).FullName
    - python -c "import svy_rs; print('OK:', svy_rs.__name__)"
  artifacts:
    paths:
      - ${SVY_RS_DIR}/dist/*.whl
    expire_in: 7 days
  allow_failure: true

build-sdist:
  stage: build
  image: python:3.11-slim
  before_script:
    - apt-get update && apt-get install -y curl gcc
    - curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
    - export PATH="$HOME/.cargo/bin:$PATH"
    - pip install maturin>=1.8
  script:
    - cd ${SVY_RS_DIR}
    - rm -rf dist && mkdir -p dist
    - maturin sdist --out dist
    - ls -lh dist/
  artifacts:
    paths:
      - ${SVY_RS_DIR}/dist/*.tar.gz
    expire_in: 7 days

# =============================================================================
# Validate
# =============================================================================

validate-wheels:
  stage: validate
  image: python:3.11-slim
  needs:
    - job: build-linux-x86_64
      artifacts: true
    - job: build-linux-aarch64
      artifacts: true
      optional: true
    - job: build-macos-arm64
      artifacts: true
      optional: true
    - job: build-windows-amd64
      artifacts: true
      optional: true
    - job: build-sdist
      artifacts: true
  script:
    - |
      python3 - <<'PY'
      import glob, zipfile, sys, os
      dist = os.path.join(os.environ.get("SVY_RS_DIR", "packages/svy-rs"), "dist")
      wheels = glob.glob(f"{dist}/*.whl")
      print(f"Found {len(wheels)} wheel(s), {len(glob.glob(f'{dist}/*.tar.gz'))} sdist(s)")
      if not wheels:
          print("ERROR: No wheels found!"); sys.exit(1)
      bad = False
      for whl in wheels:
          name = os.path.basename(whl)
          if not zipfile.is_zipfile(whl):
              print(f"  FAIL: {name}"); bad = True; continue
          with zipfile.ZipFile(whl) as zf:
              err = zf.testzip()
              print(f"  {'FAIL' if err else 'OK'}:   {name}")
              if err: bad = True
      sys.exit(1 if bad else 0)
      PY

# =============================================================================
# Publish to PyPI (only on tag)
# =============================================================================

publish-pypi:
  stage: publish
  image: python:3.11-slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^svy-rs-v/
  needs:
    - job: validate-wheels
    - job: build-linux-x86_64
      artifacts: true
    - job: build-linux-aarch64
      artifacts: true
      optional: true
    - job: build-macos-arm64
      artifacts: true
      optional: true
    - job: build-windows-amd64
      artifacts: true
      optional: true
    - job: build-sdist
      artifacts: true
  before_script:
    - pip install maturin>=1.8
  script:
    - ls -lh ${SVY_RS_DIR}/dist/
    - maturin upload --skip-existing ${SVY_RS_DIR}/dist/*
  variables:
    MATURIN_PYPI_TOKEN: $PYPI_TOKEN
