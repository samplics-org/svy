[project]
name = "svy"
version = "0.15.1"
description = "End-to-end surveys: design, sample, analyze, report."
readme = "README.md"
license = { file = "LICENSE" }
authors = [{ name = "Samplics LLC", email = "msdiallo@samplics.org" }]
keywords = ["sampling", "sample", "weighting", "estimation", "survey"]
classifiers = [
  "Programming Language :: Python :: Implementation :: CPython",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Programming Language :: Python :: 3.13",
  "Programming Language :: Python :: 3.14",
  "Development Status :: 4 - Beta",
  "Operating System :: OS Independent",
  "Topic :: Scientific/Engineering",
]


requires-python = ">=3.11"
dependencies = [
  "httpx>=0.28.1",
  "numpy>=2.3",
  "msgspec>=0.19.0",
  "polars[pyarrow]>=1.33.1",
  "svy-rs>=0.7.0",
  "scipy>=1.16.0",
  "svy-io>=0.0.10a",
]

[tool.uv.sources]
# svy-io = { path = "../svyreadstat", editable = true }
# svy-io = { git = "ssh://git@github.com/samplics-org/svy-io.git", rev = "main" }
svy-rs = { path = "../svy-rs", editable = true }

[project.optional-dependencies]
report = ["rich>=14.1", "great-tables>=0.18"]
# sae = ["svy-sae>=0.1.0"]
all = ["rich>=14.1", "great-tables>=0.18"]

[dependency-groups]
dev = [
  "codecov",
  "coverage>=7.8.0",
  "httpx",
  "jupyterlab",
  "line_profiler",
  "mypy",
  "pytest",
  "pytest-cov",
  "tqdm",
  "ty==0.0.21",
  "maturin",
  "rich",
  "ruff",
  "samplics",
]

[project.scripts]
svy = "svy.__main__:main"

[tool.black]
exclude = '''
/(
    \.eggs
  | \.git
  | \.hg
  | \.mypy_cache
  | \.tox
  | \.venv
  | _build
  | buck-out
  | build
  | dist
)/
'''
# line-length = 99
# target-version = ["py312", "py313"]

[tool.pytest.ini_options]
addopts = "--import-mode=importlib"
testpaths = ["tests"]
markers = [
    "optional: mark test as optional (e.g. requires extra dependencies like rich)",
]

# testpaths = ["tests"]


[tool.ruff]
line-length = 99
target-version = "py313"
src = ["src", "tests"]
exclude = [".venv", "build", "dist"]

[tool.ruff.lint]
select = ["D", "E", "F", "W", "I001"]
ignore = ["D", "E501"]                # for development we can ignore the docs

# Exclude a variety of commonly ignored directories.
exclude = [".venv", "tests"]


[tool.ruff.lint.pycodestyle]
ignore-overlong-task-comments = true
[tool.ruff.lint.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 10

[tool.ruff.lint.isort]
known-first-party = ["svy"]
known-third-party = [
  "matplotlib",
  "numpy",
  "pandas",
  "polars",
  "pydantic",
  "scipy",
  "statsmodels",
]
lines-after-imports = 2
lines-between-types = 1


[tool.ty.rules]
unused-ignore-comment = "ignore"
division-by-zero = "error"

[tool.ty.environment]
# root = "./src"
python = "./.venv"

[tool.mypy]
ignore_missing_imports = true
follow_imports = "silent"
strict_optional = true
allow_redefinition = false
show_error_context = false
show_column_numbers = true
# Ensure full coverage
disallow_untyped_calls = true
disallow_untyped_defs = true
disallow_incomplete_defs = true
disallow_untyped_decorators = true
# Restrict dynamic typing
disallow_any_generics = false
warn_no_return = true
warn_return_any = true
no_implicit_optional = true
# Know what you are doing
warn_unreachable = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_unused_configs = true
exclude = [".venv", "tests"]

[build-system]
requires = ["uv_build>=0.8.4,<0.9.0"]
build-backend = "uv_build"

[tool.uv.build-backend]
source-include = ["src/**", "README.md", "pyproject.toml", "LICENSE"]
source-exclude = [
    "tests/**",
    "examples/**",
    "benchmarks/**",
    "docs/**",
    "data/**",
    "reference_material/**",
    "scripts/**",
    "roadmap/**",
    "chats/**",
    "**/*.pyi",
    "**/*.bin",
]
