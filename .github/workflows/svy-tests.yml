name: svy Tests
on:
  push:
    branches: [main]
    paths:
      - "packages/svy/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/svy/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  test:
    name: Test svy (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --all-packages
      - name: Run tests
        run: make test-svy
