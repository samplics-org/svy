name: svy Tests
on:
  push:
    branches: [main]
    paths:
      - "packages/svy/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/svy-tests.yml"
  # No path filter on PRs: these jobs are required status checks on main,
  # so they must report on every PR (a path-filtered required check would
  # leave non-matching PRs stuck waiting forever).
  pull_request:
    branches: [main]
concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
permissions:
  contents: read

jobs:
  test:
    name: Test svy (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "latest"
          python-version: ${{ matrix.python-version }}
      - name: Install deps
        run: uv sync --all-packages
      - name: Run tests
        run: make test-svy
