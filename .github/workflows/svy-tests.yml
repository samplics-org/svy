name: svy Tests

on:
  push:
    branches: [main]
    paths:
      - "packages/svy/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "packages/svy/**"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/ci.yml"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --all-packages
      - name: Ruff check
        run: make lint
      - name: Ruff format
        run: make fmt

  test:
    name: Test svy
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
      - name: Install deps
        run: uv sync --all-packages
      - name: Run tests
        run: make test-svy
