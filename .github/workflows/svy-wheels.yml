name: Build and Publish svy Wheels

on:
  push:
    tags:
      - "svy-v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish_testpypi:
        type: boolean
        description: Upload to TestPyPI
        default: false
      publish_pypi:
        type: boolean
        description: Upload to PyPI
        default: false

jobs:
  build:
    name: Build svy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
        with:
          version: "latest"
          enable-cache: false
      - name: Build sdist and wheel
        run: uv build --package svy
      - name: List artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi || inputs.publish_testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ (startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi) && 'pypi' || 'testpypi' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
          skip-existing: true
