name: Build and Publish svy Wheels

on:
  push:
    tags:
      - "svy-v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish_testpypi:
        type: boolean
        description: Upload to TestPyPI
        default: false
      publish_pypi:
        type: boolean
        description: Upload to PyPI
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build svy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v4
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          version: "latest"
          enable-cache: false
      - name: Build sdist and wheel
        run: uv build --package svy
      - name: List artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi || inputs.publish_testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ (startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi) && 'pypi' || 'testpypi' }}
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dist
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          skip-existing: true
