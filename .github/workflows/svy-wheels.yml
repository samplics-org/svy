name: Build and Publish svy Wheels

on:
  push:
    tags:
      - "svy-v[0-9]+.[0-9]+.[0-9]+*"
  workflow_dispatch:
    inputs:
      publish_testpypi:
        type: boolean
        description: Upload to TestPyPI
        default: false
      publish_pypi:
        type: boolean
        description: Upload to PyPI
        default: false

permissions:
  contents: read

jobs:
  build:
    name: Build svy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: astral-sh/setup-uv@caf0cab7a618c569241d31dcd442f54681755d39 # v3
        with:
          version: "latest"
          enable-cache: false
      - name: Build sdist and wheel
        run: uv build --package svy
      - name: List artifacts
        run: ls -lh dist/
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: dist
          path: dist/*

  publish:
    name: Publish to PyPI
    needs: [build]
    if: startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi || inputs.publish_testpypi
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment:
      name: ${{ (startsWith(github.ref, 'refs/tags/svy-v') || inputs.publish_pypi) && 'pypi' || 'testpypi' }}
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: dist
          path: dist
      - name: List artifacts
        run: ls -lh dist/
      - uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # release/v1
        with:
          packages-dir: dist
          skip-existing: true
